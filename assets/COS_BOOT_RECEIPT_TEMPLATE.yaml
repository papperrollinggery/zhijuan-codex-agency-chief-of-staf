# 用户可见轻量版: COS_BOOT_RECEIPT：已启动；复杂度 T0；不派发；原因：状态说明。
# T0/T1、状态说明、轻量答复必须使用上面的中文紧凑行，不要展开英文字段表。
# 机器证据版仅用于真实派发、TOOL_BLOCKED、heartbeat 验收、release receipt、失败诊断或用户明确要求机器字段:
COS_BOOT_RECEIPT:
  skill_loaded: true
  trigger_type: explicit # explicit | implicit
  thread_role: COS
  title_action: title_update_blocked # self_set | dispatcher_set | title_preserved_by_user | title_update_blocked
  complexity: T0 # T0 | T1 | T2 | T3 | T4 | T5
  thread_tools_available: unknown # true | false | unknown
  thread_dispatch_decision: no_dispatch # dispatch | no_dispatch | tool_blocked
  worker_receipt_poll_limit: 3
  worker_receipt_poll_interval_seconds: 60
  worker_startup_grace_seconds: 120
  reason: "Tiny task and no explicit real-thread request."
