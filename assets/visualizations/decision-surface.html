<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>需要你的选择</title>
  <style>
    :root { color-scheme:light dark; --bg:#fff; --ink:#1f2328; --muted:#68707a; --line:#dfe2e5; --accent:#2563eb; --accent-soft:#eff5ff; font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    * { box-sizing:border-box; }
    body { margin:0; background:transparent; color:var(--ink); }
    main { width:min(720px,100%); margin:0 auto; padding:8px; }
    .card { padding:22px; background:var(--bg); border:1px solid var(--line); border-radius:16px; }
    .eyebrow { color:var(--accent); font-size:.8rem; font-weight:700; }
    h1 { margin:10px 0 6px; font-size:clamp(1.3rem,4vw,1.65rem); line-height:1.25; }
    .summary { margin:0 0 18px; color:var(--muted); font-size:.94rem; line-height:1.5; }
    .choices { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .choice { min-height:72px; padding:13px; color:var(--ink); background:var(--bg); border:1px solid var(--line); border-radius:12px; text-align:left; font:inherit; cursor:pointer; }
    .choice[aria-pressed="true"] { border:2px solid var(--accent); background:var(--accent-soft); }
    .choice:focus-visible,.submit:focus-visible { outline:3px solid color-mix(in srgb,var(--accent) 28%,transparent); outline-offset:2px; }
    .choice strong,.choice span { display:block; }
    .choice span { margin-top:4px; color:var(--muted); font-size:.84rem; line-height:1.4; }
    .detail { min-height:44px; margin:12px 0; color:var(--muted); font-size:.88rem; line-height:1.5; }
    .actions { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .submit { min-height:44px; padding:10px 16px; color:#fff; background:var(--accent); border:0; border-radius:10px; font:inherit; font-weight:700; cursor:pointer; }
    .state { color:var(--muted); font-size:.8rem; }
    @media (max-width:520px) { main{padding:4px}.card{padding:18px}.choices{grid-template-columns:1fr}.actions{align-items:stretch;flex-direction:column}.submit{width:100%} }
    @media (prefers-color-scheme:dark) { :root{--bg:#181a1d;--ink:#f1f3f5;--muted:#aab1ba;--line:#363a40;--accent:#72a7ff;--accent-soft:#202c41}.submit{color:#10151d} }
    @media (prefers-reduced-motion:reduce) { *{transition:none!important;animation:none!important} }
  </style>
</head>
<body>
  <main aria-labelledby="title">
    <section class="card">
      <div class="eyebrow">需要你的选择</div>
      <h1 id="title">下一步按哪种方式推进？</h1>
      <p class="summary">两个方向都会保留现有成果，区别在于速度与确认深度。</p>
      <div class="choices" role="group" aria-label="推进方式">
        <button class="choice" type="button" aria-pressed="true" data-choice="稳妥推进"><strong>稳妥推进 · 推荐</strong><span>先确认关键标准，再进入制作</span></button>
        <button class="choice" type="button" aria-pressed="false" data-choice="快速试验"><strong>快速试验</strong><span>先做小样，再根据结果调整</span></button>
      </div>
      <p class="detail" id="detail">稳妥推进：减少返工，但会多一次确认。</p>
      <div class="actions">
        <span class="state" id="state">选择尚未提交</span>
        <button class="submit" type="button" id="submit">确认这个方向</button>
      </div>
    </section>
  </main>
  <script>
    const choices=[...document.querySelectorAll('[data-choice]')];
    const detail=document.getElementById('detail');
    const state=document.getElementById('state');
    let selected='稳妥推进';
    const descriptions={稳妥推进:'稳妥推进：减少返工，但会多一次确认。',快速试验:'快速试验：更快看到样例，但可能增加一轮调整。'};
    choices.forEach(button=>button.addEventListener('click',()=>{selected=button.dataset.choice;choices.forEach(item=>item.setAttribute('aria-pressed',String(item===button)));detail.textContent=descriptions[selected];state.textContent=`已选择“${selected}”，尚未提交`; }));
    document.getElementById('submit').addEventListener('click',async()=>{const prompt=`我的选择是“${selected}”。请先核对当前任务状态，再说明接下来会做什么、会保留什么，以及有哪些需要我知道的影响。`;if(window.openai&&typeof window.openai.sendFollowUpMessage==='function'){await window.openai.sendFollowUpMessage({prompt,title:'确认推进方式'});state.textContent='已发送到对话，正在确认';}else{state.textContent=`请在聊天中输入：${prompt}`;}});
  </script>
</body>
</html>
