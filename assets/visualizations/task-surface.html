<section id="__ROOT_ID__" aria-label="__ACCESSIBLE_TITLE__">
  <style>
    #__ROOT_ID__ {
      display: grid;
      width: 100%;
      gap: 12px;
      color: var(--foreground);
    }

    #__ROOT_ID__ .agency-stage-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(136px, 1fr));
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    #__ROOT_ID__ .agency-stage-item {
      display: grid;
      min-width: 0;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: start;
      gap: 7px;
    }

    #__ROOT_ID__ .agency-stage-marker {
      width: 10px;
      height: 10px;
      margin-top: 5px;
      border: 1px solid var(--muted-foreground);
      border-radius: 50%;
      background: transparent;
    }

    #__ROOT_ID__ .agency-stage-item[data-state="completed"] .agency-stage-marker {
      border-color: var(--viz-series-1);
      background: var(--viz-series-1);
    }

    #__ROOT_ID__ .agency-stage-item[data-state="current"] .agency-stage-marker {
      border: 3px solid var(--primary-foreground);
      background: var(--viz-series-1);
      outline: 1px solid var(--viz-series-1);
    }

    #__ROOT_ID__ .agency-stage-copy {
      display: grid;
      min-width: 0;
      gap: 2px;
      overflow-wrap: anywhere;
    }

    #__ROOT_ID__ .agency-stage-detail {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    @media (max-width: 420px) {
      #__ROOT_ID__ .agency-stage-list {
        grid-template-columns: 1fr;
      }

    }
  </style>
  <ol class="agency-stage-list" aria-label="任务阶段">
    __STAGES__
  </ol>
  <div class="viz-row" aria-label="下一步">
    <span class="viz-badge">下一步</span>
    <span class="agency-stage-detail">__NEXT_STEP__</span>
  </div>
  __BLOCKER__
</section>
