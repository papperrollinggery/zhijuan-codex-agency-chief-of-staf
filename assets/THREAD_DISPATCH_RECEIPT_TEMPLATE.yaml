# 用户可见时必须先显示中文派发摘要卡，不能只显示下面的机器字段。
# 示例:
# THREAD_DISPATCH_RECEIPT：已派发真实执行线程
#
# 派发摘要
# | 项目 | 内容 |
# |---|---|
# | 工作线程 | `019f...` |
# | 职责 | 开发执行 worker |
# | 读取范围 | 项目目录和临时验证目录 |
# | 写入范围 | 仅临时目录 |
# | 预期回执 | `WORKER_RECEIPT` |
# | 身份契约 | 已写入 worker 自己的 thread_id |
# | 收尾方式 | 回执后归档，或保留并写明原因 |
# | 当前状态 | 已派发，等待回执 |
#
# 机器凭证:
THREAD_DISPATCH_RECEIPT:
  thread_id: "" # required when status=dispatched
  pending_worktree_id: "" # allowed only when status=dispatch_pending
  thread_class: implementation_worker # implementation_worker | review_worker | scout_worker | rescue_worker | planner_worker
  read_scope: ""
  write_scope: ""
  expected_receipt: ""
  worker_prompt_identity_contract: included # included | pending_until_thread_id_known
  title_action: dispatcher_set # self_set | dispatcher_set | title_preserved_by_user | title_update_blocked
  cleanup_plan: archive_after_receipt # archive_after_receipt | keep_open_with_reason | cleanup_blocked
  status: dispatched # dispatched | dispatch_pending
